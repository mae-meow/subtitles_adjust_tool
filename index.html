<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRT Timestamp Adjuster</title>

<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 1200px;
    margin: 20px auto;
    padding: 20px;
    color: #9a7ba0;
    background: #121212;
  }

  .header img {
    float: right;
    width: 100px;
    height: 100px;
    padding-right: 770px;
  }

  .header h1 {
    position: relative;
    top: 18px;
  }
  h1 {
    margin-top: 0;
  }

  .controls {
    margin-bottom: 20px;
  }

  label {
    font-weight: bold;
  }

  input[type="number"] {
    width: 120px;
    padding: 8px;
    margin-top: 5px;
    color: #9a7ba0;
    background: #232121;
    border:1px solid #232121;
  }

  input[type="number"]:focus {
    outline: none !important;
    border:1px solid rgb(32, 30, 30);
    box-shadow: 0 0 10px #282d33;
  }

  textarea {
    width: 100%;
    height: 300px;
    box-sizing: border-box;
    font-family: Consolas, monospace;
    font-size: 13px;
    color: #9a7ba0;
    resize: vertical;
    background: #232121;
    border: 1px solid #232121;
  }

  textarea:focus {
    outline: none !important;
    border:1px solid rgb(32, 30, 30);
    box-shadow: 0 0 10px #282d33;
  }

  button {
    padding: 10px 20px;
    margin: 10px 0px 22px 0px;
    cursor: pointer;
    background: #9a7ba0;
    border: 1px solid #232121;
  }

  button:hover {
    background: #79617e;
  }

  .help {
    color: #666;
    margin-top: 5px;
  }

  .section {
    margin-bottom: 20px;
  }
</style>
</head>
<body>


<div class="header">
  <h1>Subtitles Timestamp Adjuster</h1>
  <IMG SRC="burenyu.gif">
</div>

<div class="controls">
  <label for="shift">
    Seconds to shift:
  </label>
  <br>

  <input
    id="shift"
    type="number"
    step="0.1"
    value="-5"
  >

  <div class="help">
    Negative values move subtitles earlier.<br>
    Positive values move subtitles later.
  </div>
</div>

<div class="section">
  <label for="input">Input Subs:</label>
  <br><br>

  <textarea id="input"></textarea>
</div>

<button id="adjustBtn">
  Adjust Timestamps
</button>

<div class="section">
  <label for="output">Output Subs:</label>
  <br><br>

  <textarea id="output"></textarea>
</div>

<script src="script.js"></script>

</body>
</html>
